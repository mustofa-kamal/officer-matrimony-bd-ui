<app-header></app-header>

<div class="flex bg-gray-50 min-h-screen relative">
  
  <aside 
    [class.w-64]="uiService.isSidebarVisible()" 
    [class.w-0]="!uiService.isSidebarVisible()"
    class="bg-white border-r border-gray-200 transition-all duration-300 ease-in-out sticky top-14 h-[calc(100vh-3.5rem)] overflow-hidden z-40"
  >
    <div class="p-4 w-64"> <app-filter-bar></app-filter-bar>
    </div>
  </aside>

  <main class="flex-1 p-4 md:p-8 transition-all duration-300">
        <div class="flex flex-wrap gap-4 justify-center md:justify-start">
          @for (profile of profileService.displayProfiles(); track profile.id) {
        
        <div class="w-[170px] bg-white rounded-[1.5rem] shadow-md border border-gray-100 flex flex-col items-center p-3 transition-all hover:shadow-lg">
          
          <div class="w-full aspect-square bg-[#f8a5a5] rounded-xl overflow-hidden mb-3">
            <img [src]="profile.imageUrl" 
     [alt]="profile.name" 
     class="w-full h-full object-cover object-top">
          </div>

          <h3 class="text-sm font-extrabold text-black mb-0.5 text-center">
            {{ profile.name }} , {{ profile.age }}
          </h3>
          
          <p class="text-gray-500 text-xs font-semibold mb-4">
            {{ profile.location }}
          </p>

          <div class="flex flex-col items-center gap-3 mb-4">
            <button class="text-[#87d7e5] hover:scale-110 transition">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM9 11H7V9h2v2zm4 0h-2V9h2v2zm4 0h-2V9h2v2z"/>
              </svg>
            </button>
            <button class="text-[#cd4a55] hover:scale-110 transition">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 rotate-90" fill="currentColor" viewBox="0 0 24 24">
                <path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
              </svg>
            </button>
          </div>

          <div class="w-full flex justify-between items-center mt-auto px-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-[#87d7e5]" fill="currentColor" viewBox="0 0 24 24">
              <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
            </svg>

            <div [class.bg-[#8cc67e]]="profile.isOnline" 
                [class.bg-[#cd4a55]]="!profile.isOnline" 
                class="w-3 h-3 rounded-full shadow-sm">
            </div>
          </div>

        </div>
      }
    </div>
  </main>
</div>
