<app-header></app-header>

<div class="flex bg-gray-50 min-h-screen">
  
  <aside 
    [class.translate-x-0]="uiService.isSidebarVisible()" 
    [class.-translate-x-full]="!uiService.isSidebarVisible()"
    class="
      md:translate-x-0 md:static md:block md:w-72 md:bg-transparent md:border-r border-gray-200
      fixed inset-0 z-50 w-full h-full bg-white transition-transform duration-300 ease-in-out
    "
  >
    <div class="flex items-center justify-between p-4 border-b md:hidden bg-white sticky top-0 z-10">
      <button (click)="uiService.toggleSidebar()" class="text-blue-600 text-2xl font-light">✕</button>
      <h2 class="text-lg font-bold text-slate-800">Filter</h2>
      <button (click)="filterService.resetAll()" class="text-blue-600 text-sm font-medium">Reset</button>
    </div>

    <div class="p-6">
      <app-filter-bar></app-filter-bar>
    </div>

    <div class="p-4 border-t md:hidden sticky bottom-0 bg-white">
      <button (click)="uiService.toggleSidebar()" class="w-full bg-blue-600 text-white py-3.5 rounded-full font-bold">
        Show {{ profileService.profileCount() }} results
      </button>
    </div>
  </aside>

  <main class="flex-1 p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
      
      <div class="mb-8">
        <h2 class="text-2xl font-black text-slate-900 tracking-tight">Officer Profiles</h2>
        <p class="text-gray-500 text-sm mt-1">
          <span class="font-bold text-slate-800">{{ profileService.profileCount() }}</span> results found
        </p>
        
        <button (click)="uiService.toggleSidebar()" class="mt-4 w-full md:hidden flex items-center justify-center gap-2 border border-gray-300 py-2 rounded-full font-bold text-sm text-slate-700">
          Filter & Sort
        </button>
      </div>

      <div class="flex flex-wrap gap-6 justify-center md:justify-start">
        @for (profile of profileService.displayProfiles(); track profile.id) {
          <div class="w-[170px] bg-white rounded-[1.5rem] shadow-sm border border-gray-100 flex flex-col items-center p-3 transition-all hover:shadow-md">
            <div class="w-full aspect-square bg-[#f8a5a5] rounded-xl overflow-hidden mb-3">
              <img [src]="profile.imageUrl" [alt]="profile.name" class="w-full h-full object-cover object-top">
            </div>
            <h3 class="text-sm font-extrabold text-black mb-0.5 text-center">{{ profile.name }}, {{ profile.age }}</h3>
            <p class="text-gray-500 text-[10px] font-semibold mb-4">{{ profile.location }}</p>
            
            <div class="flex flex-col items-center gap-3 mb-4">
              <button class="text-[#87d7e5]"><svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM9 11H7V9h2v2zm4 0h-2V9h2v2zm4 0h-2V9h2v2z"/></svg></button>
              <button class="text-[#cd4a55] rotate-90"><svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg></button>
            </div>

            <div class="w-full flex justify-between items-center mt-auto px-1">
              <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-[#87d7e5]" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
              <div [class.bg-[#8cc67e]]="profile.isOnline" [class.bg-[#cd4a55]]="!profile.isOnline" class="w-2.5 h-2.5 rounded-full"></div>
            </div>
          </div>
        }
      </div>

    </div>
  </main>
</div>
