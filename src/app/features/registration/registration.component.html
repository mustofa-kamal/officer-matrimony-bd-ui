<div class="max-w-2xl mx-auto mb-8 px-4">
  <div class="flex justify-between items-center mb-2">
    <h2 class="text-[10px] font-bold uppercase tracking-wider text-orange-600">Step 1 of 6</h2>
    <span class="text-[10px] font-medium text-gray-400 uppercase">Registration</span>
  </div>
  <div class="w-full h-1 bg-gray-200 rounded-full">
    <div class="h-full bg-orange-500 transition-all duration-500" [style.width]="'16.6%'"></div>
  </div>
</div>

<div class="max-w-2xl mx-auto px-6 pb-20">
  
  <header class="mb-8">
    <h1 class="text-xl font-bold text-slate-800 mb-1">Create Account</h1>
    <p class="text-gray-500 text-xs font-medium">Please enter your details to register.</p>
  </header>

  <form class="space-y-5">
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex flex-col gap-1.5">
        <label class="text-[11px] font-bold text-gray-600 uppercase ml-0.5">Email Address *</label>
        <input type="email" name="email" [(ngModel)]="formData.email" 
               class="w-full h-10 px-3 rounded-md border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all text-sm text-slate-900">
        <span class="text-[10px] text-gray-400 italic">This will be your login ID</span>
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-[11px] font-bold text-gray-600 uppercase ml-0.5">Password *</label>
        <input type="password" name="password" [(ngModel)]="formData.password"
               class="w-full h-10 px-3 rounded-md border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all text-sm">
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div class="flex flex-col gap-1.5">
        <label class="text-[11px] font-bold text-gray-600 uppercase ml-0.5">Full Name *</label>
        <input type="text" name="fullName" [(ngModel)]="formData.fullName"
               class="w-full h-10 px-3 rounded-md border border-gray-300 focus:border-blue-500 focus:ring-1 focus:ring-blue-500 outline-none transition-all text-sm">
      </div>

      <div class="flex flex-col gap-1.5">
        <label class="text-[11px] font-bold text-gray-600 uppercase ml-0.5">Gender *</label>
        <select name="gender" [(ngModel)]="formData.gender"
                class="w-full h-10 px-3 rounded-md border border-gray-300 focus:border-blue-500 outline-none bg-white text-sm cursor-pointer">
          <option value="">- Select -</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
      </div>
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="text-[11px] font-bold text-gray-600 uppercase ml-0.5">Date of Birth *</label>
      <div class="flex gap-2">
        <select name="day" [(ngModel)]="formData.dobDay" class="flex-1 h-10 px-2 rounded-md border border-gray-300 bg-white text-sm">
          <option value="">Day</option>
          @for(d of days; track d) { <option [value]="d">{{d}}</option> }
        </select>
        <select name="month" [(ngModel)]="formData.dobMonth" class="flex-1 h-10 px-2 rounded-md border border-gray-300 bg-white text-sm">
          <option value="">Month</option>
          @for(m of months; track m) { <option [value]="m">{{m}}</option> }
        </select>
        <select name="year" [(ngModel)]="formData.dobYear" class="flex-1 h-10 px-2 rounded-md border border-gray-300 bg-white text-sm">
          <option value="">Year</option>
          @for(y of years; track y) { <option [value]="y">{{y}}</option> }
        </select>
      </div>
    </div>

    <div class="flex flex-col gap-1.5">
      <label class="text-[11px] font-bold text-gray-600 uppercase ml-0.5">Mobile Number</label>
      <div class="flex gap-2">
        <select name="countryCode" [(ngModel)]="formData.countryCode"
                class="w-24 h-10 px-2 rounded-md border border-gray-300 bg-white text-sm">
          <option value="+880">+880</option>
          <option value="+91">+91</option>
        </select>
        <input type="text" name="mobile" [(ngModel)]="formData.mobile" 
               class="flex-1 h-10 px-3 rounded-md border border-gray-300 focus:border-blue-500 outline-none text-sm">
      </div>
    </div>

    <div class="pt-6 flex flex-col gap-3">
      <button (click)="onSaveNext()" 
              class="w-full h-11 bg-slate-800 text-white rounded-md font-bold text-sm hover:bg-slate-900 transition-colors active:scale-[0.99] flex items-center justify-center gap-2">
        Save & Continue
      </button>
      
      <button (click)="uiService.isRegistering.set(false)" 
              class="w-full text-[11px] font-bold text-gray-400 hover:text-gray-600 transition-colors py-2 uppercase tracking-tight">
        Cancel
      </button>
    </div>

  </form>
</div>
